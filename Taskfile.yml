version: "3"

tasks:
  default:
    cmds:
      - task: app:dev
    silent: true

  frontend:build:
    desc: Build the Vue frontend
    dir: frontend
    cmds:
      - npm run build

  app:build:
    desc: Build the production binary with VCS info embedded
    vars:
      REVISION:
        sh: git rev-parse --short HEAD
      MODIFIED:
        sh: git diff --quiet && echo false || echo true
    cmds:
      - go mod tidy
      - wails build -tags webkit2_41 -ldflags "-X github.com/rhemvi/omaclip/foundation/vcs.Revision={{.REVISION}} -X github.com/rhemvi/omaclip/foundation/vcs.Modified={{.MODIFIED}}"

  app:dev:
    desc: Start the application in development mode
    cmds:
      - wails dev

  test:
    desc: Run all Go tests
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  aur:clean:
    desc: Remove downloaded omaclip-linux-* binaries from build/aur
    dir: build/aur
    cmds:
      - rm -f omaclip-linux-*

  aur:checksums:
    desc: Regenerate checksums and .SRCINFO for the AUR omaclip-bin package
    dir: build/aur
    deps: [aur:clean]
    cmds:
      - updpkgsums
      - makepkg --printsrcinfo > .SRCINFO

  aur:publish:
    desc: Update and push the AUR omaclip-bin package
    dir: build/aur
    deps: [aur:checksums]
    vars:
      VERSION:
        sh: grep '^pkgver=' PKGBUILD | cut -d= -f2
      AUR_REPO: /tmp/omaclip-bin-aur
    cmds:
      - rm -rf {{.AUR_REPO}}
      - git clone ssh://aur@aur.archlinux.org/omaclip-bin.git {{.AUR_REPO}}
      - cp PKGBUILD .SRCINFO omaclip.desktop {{.AUR_REPO}}/
      - cd {{.AUR_REPO}} && git add -A && git commit -m "Update to {{.VERSION}}" && git push
      - rm -rf {{.AUR_REPO}}
